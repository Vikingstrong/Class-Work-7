<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Work 4</title>
    <link rel="stylesheet" href="src/output.css">
</head>
<body>
<header class="border-b-[#E4E4E4] border-b-[2px] ">
    <div class="p-6.25 flex justify-between max-w-300 m-auto items-center ">
        <img src="src/img/header/logo.png" alt="">
        <nav class="hidden lg:flex items-center gap-5 text-[16px] text[#0F241D]">
            <p>Início</p>
            <p>Sobre</p>
            <p>Serviços</p>
            <p>Depoimentos</p>
            <p>Contato</p>
        </nav>
        <p class="font-bold text-[24px] text-[#69B99D] lg:hidden">☰</p>
    </div>
</header>
<section class="max-w-300 m-auto p-6.25 text-center items-center flex flex-col gap-5 lg:flex-row-reverse lg:py-12.5 lg:justify-between">
    <img src="src/img/section1/Img.png" alt="">
    <aside class="flex flex-col gap-5 items-center lg:items-start lg:text-start">
        <h2 class="text-[30px] font-bold lg:text-[48px]">Saúde natural para os seus cabelos</h2>
        <p class="text-[16px] text-[#767676] lg:text-[18px]">Um salão exclusivo em São Paulo, <br> especializado em tratamentos naturais.</p>
        <button class="text-[white] text-[16px] font-medium py-3.75 px-8.75 bg-[#69B99D] rounded-sm mt-1.25">Agendar um horário</button>
    </aside>
</section>
</body>
</html>
